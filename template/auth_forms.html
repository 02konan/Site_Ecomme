<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Authentification</title>
</head>
<body>

<div class="container">
    
<div class="auth-wrap">

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Se connecter</button>
        <button class="tab-btn" onclick="switchTab('register')">S'inscrire</button>
    </div>

    <div class="form-box">

        <!-- CONNEXION -->
<div class="form-panel active" id="panel-login">

    <div class="field">
        <label>Adresse email</label>
        <div class="field-wrap">
            <i class="ti ti-mail" aria-hidden="true"></i>
            <input type="email" id="login-email" placeholder="exemple@email.com" value="{{ prefill_email or '' }}">
        </div>
    </div>

    <div class="field">
        <label>Mot de passe</label>
        <div class="field-wrap">
            <i class="ti ti-lock" aria-hidden="true"></i>
            <input type="password" id="login-pwd" placeholder="••••••••" value="{{ prefill_pwd or '' }}">
            <button class="eye-btn" onclick="togglePwd('login-pwd', this)">
                <i class="ti ti-eye" style="font-size:16px"></i>
            </button>
        </div>
    </div>

    <div class="forgot"><a href="#">Mot de passe oublié ?</a></div>

    <!-- ← onclick ajouté -->
    <button class="btn-submit" onclick="connexion()">Se connecter</button>

    <div class="divider">ou</div>

    <button class="btn-social">
        <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M21.805 10.023h-9.806v3.954h5.654c-.245 1.318-.982 2.436-2.09 3.188v2.654h3.384c1.984-1.826 3.128-4.518 3.128-7.792 0-.528-.047-1.042-.166-1.95z"/>
            <path fill="#34A853" d="M11.999 21c2.835 0 5.218-.938 6.958-2.54l-3.384-2.654c-.94.63-2.144 1-3.574 1-2.747 0-5.074-1.856-5.906-4.354H2.11v2.73C3.846 19.856 7.256 21 11.999 21z"/>
            <path fill="#FBBC05" d="M6.093 12c-.213-.63-.335-1.305-.335-1.995s.122-1.365 .335-1.995V5H2.11C1.39 6.856 .999 9 .999 12s .391 5.144 1.111 7z"/>
            <path fill="#EA4335" d="M11.999 4c1.544 0 2.918 .53 4 .156l3-2C17.214 .938 14.83 .001 11.999 .001c -4 .001 -7 .856 -7 .856v3h6z"/>
            
        </svg>
        Continuer avec Google
    </button>

    <div class="switch-txt">
        Pas encore de compte ? <a onclick="switchTab('register')">S'inscrire</a>
    </div>
</div>

<!-- INSCRIPTION -->
<div class="form-panel" id="panel-register">

    <div class="field">
        <label>Nom complet</label>
        <div class="field-wrap">
            <i class="ti ti-user" aria-hidden="true"></i>
            <input type="text" id="reg-nom" placeholder="Kouassi Jean"> <!-- ← id ajouté -->
        </div>
    </div>

    <div class="field">
        <label>Adresse email</label>
        <div class="field-wrap">
            <i class="ti ti-mail" aria-hidden="true"></i>
            <input type="email" id="reg-email" placeholder="exemple@email.com"> <!-- ← id ajouté -->
        </div>
    </div>

    <div class="field">
        <label>Téléphone</label>
        <div class="field-wrap">
            <i class="ti ti-phone" aria-hidden="true"></i>
            <input type="tel" id="reg-tel" placeholder="07 00 00 00 00"> <!-- ← id ajouté -->
        </div>
    </div>

    <div class="field">
        <label>Mot de passe</label>
        <div class="field-wrap">
            <i class="ti ti-lock" aria-hidden="true"></i>
            <input type="password" id="pwd-register" placeholder="••••••••">
            <button class="eye-btn" onclick="togglePwd('pwd-register', this)">
                <i class="ti ti-eye" style="font-size:16px"></i>
            </button>
        </div>
    </div>

    <div class="field">
        <label>Confirmer le mot de passe</label>
        <div class="field-wrap">
            <i class="ti ti-lock-check" aria-hidden="true"></i>
            <input type="password" id="pwd-confirm" placeholder="••••••••">
            <button class="eye-btn" onclick="togglePwd('pwd-confirm', this)">
                <i class="ti ti-eye" style="font-size:16px"></i>
            </button>
        </div>
    </div>

    <!-- ← onclick ajouté -->
    <button class="btn-submit" onclick="inscription()">Créer mon compte</button>

    <div class="terms">
        En vous inscrivant, vous acceptez nos <a href="#">CGU</a> et notre <a href="#">politique de confidentialité</a>
    </div>

    <div class="switch-txt">
        Déjà un compte ? <a onclick="switchTab('login')">Se connecter</a>
    </div>
</div>

    </div>
</div>
</div>

{%include "scripts.html"%}
</body>
</html>
