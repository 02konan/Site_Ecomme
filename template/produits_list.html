{% extends "base.html" %}

{% block title %}Tous nos produits - eShop{% endblock %}

{% block content %}
<div class="py-5">
    <div class="container py-5">
        <!-- Header -->
        <div class="row mb-4 py-3">
            <div class="col-12">
                <h1 class="subtitle" data-aos="fade-up">Nos Produits</h1>
                <p class="text-muted" data-aos="zoom-out" data-aos-delay="200">Découvrez notre vaste sélection de produits de qualité</p>
            </div>
        </div>

        <!-- Barre outils : bouton filtre + tri -->
        <div class="d-flex align-items-center justify-content-between mb-4" data-aos="fade-up">
            <button class="btn btn-outline-secondary rounded-pill d-flex align-items-center gap-2" onclick="ouvrirDrawerFiltres()">
                <i class="bi bi-sliders"></i> Filtres
                <span id="filtres-compteur" class="badge bg-dark rounded-pill" style="display:none;">0</span>
            </button>
            <!-- <select class="form-select form-select-sm w-auto rounded-pill">
                <option>Trier par : Popularité</option>
                <option>Prix croissant</option>
                <option>Prix décroissant</option>
                <option>Nouveautés</option>
                <option>Mieux notés</option>
            </select> -->
        </div>

        <!-- Grille produits -->
        <div class="row g-4" id="NosProduits" data-aos="fade-up" data-aos-delay="0">
            <div class="col-12 col-sm-6 col-md-4 col-lg-3"></div>
        </div>
    </div>
</div>

<!-- ===== DRAWER FILTRES ===== -->
<div class="drawer-overlay" id="overlayFiltres" onclick="fermerDrawerFiltres()"></div>
<div class="drawer-filtres" id="drawerFiltres">
    <div class="drawer-header">
        <h2 style="font-size:16px;font-weight:500;margin:0;">
            <i class="bi bi-sliders me-2"></i>Filtres
        </h2>
        <button id="closeFiltres" class="btn btn-sm" onclick="fermerDrawerFiltres()">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>

    <div class="drawer-body">
        <!-- Prix -->
        <div class="filter-group mb-4">
            <h6 class="filter-title mb-3">Gamme de prix</h6>
            <div class="d-flex gap-2 mb-2">
                <input type="number" id="prixMin" class="form-control form-control-sm rounded-pill" placeholder="Min" min="0">
                <input type="number" id="prixMax" class="form-control form-control-sm rounded-pill" placeholder="Max" min="0">
            </div>
        </div>

        <hr>

        <!-- Notes -->
        <div class="filter-group mb-4">
            <h6 class="filter-title mb-3">Note minimale</h6>
            {% for i in range(5, 0, -1) %}
            <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="rating{{ i }}" value="{{ i }}">
                <label class="form-check-label d-flex align-items-center gap-1" for="rating{{ i }}">
                    {% for j in range(i) %}<i class="bi bi-star-fill text-warning" style="font-size:12px;"></i>{% endfor %}
                    <span class="text-muted" style="font-size:13px;">& plus</span>
                </label>
            </div>
            {% endfor %}
        </div>

    </div>

    <!-- Footer : reset + appliquer -->
    <div class="drawer-footer d-flex gap-2">
        <button onclick="resetFiltres()" class="btn btn-outline-secondary flex-grow-1 rounded-pill">
            <i class="bi bi-arrow-counterclockwise me-1"></i>Réinitialiser
        </button>
        <button onclick="appliquerFiltres()" class="btn btn-dark flex-grow-1 rounded-pill">
            Appliquer
        </button>
    </div>
</div>

<div class="container pb-5">
    <p class="text-muted fs-5" data-aos="fade-up" data-aos-delay="0">Vu récemment</p>

    <!-- Carousel produits - avance 1 par 1 -->
    <div class="products-carousel-wrapper position-relative mt-4" data-aos="fade-up" data-aos-delay="0">

        <!-- Flèche gauche -->
        <button class="products-carousel-btn prev" id="productsPrevRecents">
            <i class="bi bi-chevron-left"></i>
        </button>

        <!-- Track -->
        <div class="products-carousel-track-outer">
            <div class="products-carousel-track" id="productsTrackRecents">
                <div class="products-carousel-slide">
                    
                </div>
            </div>
        </div>

        <!-- Flèche droite -->
        <button class="products-carousel-btn next" id="productsNextRecents">
            <i class="bi bi-chevron-right"></i>
        </button>

        <!-- Dots -->
        <div class="products-carousel-dots" id="productsDotsRecents"></div>
    </div>
</div>
{% endblock %}
