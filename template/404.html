{% extends "base.html" %}

{% block title %}Erreur 404 - Page non trouvée{% endblock %}

{% block content %}
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <h1 style="font-size: 120px; font-weight: bold; color: #ddd;">404</h1>
                <h2 class="mb-4">Page non trouvée</h2>
                <p class="text-muted mb-4">Désolé, la page que vous recherchez n'existe pas ou a été déplacée.</p>
                <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
                    <i class="bi bi-house-fill me-2"></i> Retour à l'accueil
                </a>
            </div>
        </div>
    </div>
{% endblock %}
