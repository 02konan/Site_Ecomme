<script>
        document.addEventListener('DOMContentLoaded', function() {
            const navbar = document.querySelector('.navbar');
            const productsSection = document.querySelector('.container.pt-5.event');

            function updateNavbarColor() {
                if (!productsSection) return;

                const productsSectionTop = productsSection.offsetTop;
                const navbarHeight = navbar.offsetHeight;
                const scrollPosition = window.scrollY;

                // Si la navbar atteint la section des produits (fond blanc)
                if (scrollPosition + navbarHeight >= productsSectionTop) {
                    navbar.classList.add('navbar-dark');
                } else {
                    navbar.classList.remove('navbar-dark');
                }
            }

            // Écouter les événements de scroll
            window.addEventListener('scroll', updateNavbarColor);
            // Vérifier au chargement de la page
            updateNavbarColor();

            // Prevent link activation when clicking on "Panier" buttons
            const panierButtons = document.querySelectorAll('.product-card .btn');
            panierButtons.forEach(button => {
                button.addEventListener('click', function(event) {
                    event.preventDefault();
                    event.stopPropagation();
                    // Add your cart logic here if needed
                    console.log('Panier button clicked');
                });
            });
        });
       
      AOS.init({
        duration: 1000,
        once: true
      });
    
</script>
</body>
</html>
