<!-- Navbar fixe -->
<nav class="navbar">
    <div class="container-fluid px-3 px-lg-4 d-flex align-items-center justify-content-between">

        <!-- Gauche : burger (mobile) -->
        <div class="d-flex align-items-center gap-3">
            <button class="navbar-burger" type="button" data-bs-toggle="offcanvas" data-bs-target="#navOffcanvas" aria-controls="navOffcanvas">
                <i class="bi bi-list"></i>
            </button>
        </div>

        <!-- Logo -->
        <a href="/">
            <img class="logo" src="{{ url_for('static', filename='back/logo.jpeg') }}" alt="Logo TouAchat">
        </a>
        <div class="d-flex align-items-center gap-2">
            <button onclick="ouvrirDrawer()" class="btn btn-sm btn-primary-custom rounded-circle position-relative cart">
                <i class="bi bi-bag-fill"></i>
                <span id="panier-compteur"
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                    style="display:none;font-size:10px;">0</span>
            </button>

            <button onclick="ouvrirDrawerFavoris()" class="btn btn-sm btn-primary-custom rounded-circle position-relative">
                <i class="bi bi-heart-fill"></i>
                <span id="favoris-compteur"
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                    style="display:none;font-size:10px;">0</span>
            </button>
        </div>
    </div>
</nav>

<!-- Barre de recherche sticky -->
<div class="search-sticky-wrapper">
    <div class="search-container sticky" id="searchContainer">
        <div class="container">
            <div class="search-wrapper">
                <div class="search-input-group">
                    <span class="search-icon">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="text"
                        class="search-input"
                        placeholder="Rechercher un produit, une marque..."
                        id="searchInput">
                    <button class="search-clear" id="searchClear" style="display:none;">
                        <i class="bi bi-x-lg"></i>
                    </button>
                    <button class="btn btn-sm btn-primary-custom rounded-circle me-2">
                        <i class="bi bi-arrow-right"></i>
                    </button>
                </div>

                <!-- Suggestions -->
                <div class="search-suggestions" id="searchSuggestions" style="display:none;">
                    <div class="suggestions-header">
                        <span>Suggestions récentes</span>
                        <button class="clear-all">Tout effacer</button>
                    </div>
                    <div class="suggestions-list"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ===== DRAWER FAVORIS ===== -->
<div class="drawer-favoris" id="drawerFavoris">
    <div class="drawer-header">
        <h2 style="font-size:16px;font-weight:500;margin:0;">Mes favoris</h2>
        <button id="closeFavoris" class="btn btn-sm" aria-label="Fermer les favoris">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>
    <div class="drawer-body" id="drawerFavorisBody">
        <div class="text-center py-5 text-muted">
            <i class="bi bi-heartbreak fs-1"></i>
            <p class="mt-2">Vous n'avez pas encore de favoris</p>
        </div>
    </div>
</div>  


<!-- ===== DRAWER PANIER ===== -->

<!-- Overlay -->
<div class="drawer-overlay" id="drawerOverlay"></div>

<!-- Drawer -->
<div class="drawer-panier" id="drawerPanier">

    <!-- Header -->
    <div class="drawer-header">
        <h2 style="font-size:16px;font-weight:500;margin:0;">
            Mon panier
            <span id="drawer-count" 
                  style="color:var(--text-secondary);font-weight:400;font-size:13px;">
                (0 article)
            </span>
        </h2>
        <button id="closeDrawer" class="btn btn-sm" aria-label="Fermer le panier">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>

    <!-- Body — articles -->
    <div class="drawer-body" id="drawerBody">
        <div class="text-center py-5 text-muted">
            <i class="bi bi-cart-x fs-1"></i>
            <p class="mt-2">Votre panier est vide</p>
        </div>
    </div>

    <!-- Footer — total + boutons -->
    <div class="drawer-footer">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="text-muted">Total</span>
            <span class="fw-bold fs-6" id="drawerTotal">FCFA 0</span>
        </div>
        <button onclick="fermerDrawer(); ouvrirModal();" 
                class="btn btn-dark w-100 rounded-pill mb-2">
            <i class="bi bi-bag-check me-2"></i>Valider la commande
        </button>
        <button id="continueBtn" class="btn btn-outline-secondary w-100 rounded-pill">
            Continuer mes achats
        </button>
    </div>

</div>

<!-- MODALE COMMANDE -->
<div class="modal-overlay" id="modalOverlay"></div>

<div class="modal-commande" id="modalCommande">

    <!-- Étape 1 : Formulaire livraison -->
    <div class="modal-step" id="step1">
        <div class="modal-header-cmd">
            <h2>Informations de livraison</h2>
            <button onclick="fermerModal()" class="btn btn-sm"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="modal-body-cmd">
            <div class="mb-3">
                <label class="form-label">Nom complet <span class="text-danger">*</span></label>
                <input type="text" class="form-control rounded-pill" id="cmd-nom" placeholder="Ex: Kouassi Jean" value="{{ prefill_nom or '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Téléphone <span class="text-danger">*</span></label>
                <input type="tel" class="form-control rounded-pill" id="cmd-tel" maxlength="10" inputmode="numeric" placeholder="Ex: 07 00 00 00 00" value="{{ prefill_tel or '' }}">
       
            </div>
            <div class="mb-3">
                <label class="form-label">Commune de livraison <span class="text-danger">*</span></label>
                <select class="form-control" id="cmd-adresse" onchange="afficherVille()">
                    <option value="">-- Choisir une commune --</option>
                    <option value="Abobo"        data-frais="1500">Abobo — Livraison 1 500 FCFA</option>
                    <option value="Anani"        data-frais="2000">Anani — Livraison 2 000 FCFA</option>
                    <option value="Adjamé"       data-frais="1500">Adjamé — Livraison 1 500 FCFA</option>
                    <option value="Attécoubé"    data-frais="1500">Attécoubé — Livraison 1 500 FCFA</option>
                    <option value="Cocody"       data-frais="1500">Cocody — Livraison 1 500 FCFA</option>
                    <option value="Grand Bassam" data-frais="2000">Grand Bassam — Livraison 2 000 FCFA</option>
                    <option value="Koumassi"     data-frais="1500">Koumassi — Livraison 1 500 FCFA</option>
                    <option value="Marcory"      data-frais="1500">Marcory — Livraison 1 500 FCFA</option>
                    <option value="Plateau"      data-frais="1500">Plateau — Livraison 1 500 FCFA</option>
                    <option value="Port-Bouët"   data-frais="1500">Port-Bouët — Livraison 1 500 FCFA</option>
                    <option value="Treichville"  data-frais="1500">Treichville — Livraison 1 500 FCFA</option>
                    <option value="Yopougon"     data-frais="1500">Yopougon — Livraison 1 500 FCFA</option>
                    <option value="Bingerville"  data-frais="1500">Bingerville — Livraison 1 500 FCFA</option>
                    <option value="Songon"       data-frais="2000">Songon — Livraison 2 000 FCFA</option>
                    <option value="Anyama"       data-frais="2000">Anyama — Livraison 2 000 FCFA</option>
                    <option value="Autres"        data-frais="2500">Autres villes (Expedition) — Livraison 2 500 FCFA</option>
                </select>
            </div>

            <!-- Champ Ville caché par défaut -->
            <div class="mb-3" id="div-ville" style="display:none;">
                <label class="form-label">Ville <span class="text-danger">*</span></label>
                <input type="text" class="form-control rounded-pill" id="cmd-ville" placeholder="Ex: Bouaké, San Pedro...">
            </div>

            <!-- Champ Quartier -->
            <div class="mb-3">
                <label class="form-label">Quartier <span class="text-danger">*</span></label>
                <input type="text" class="form-control rounded-pill" id="cmd-quartier" placeholder="Ex: Angré, Deux Plateaux, Zone 4...">
            </div>

            <!-- Notes supplémentaires -->
            <div class="mb-3">
                <label class="form-label">Notes supplémentaires <span class="text-muted" style="font-size:0.8rem;">(facultatif)</span></label>
                <textarea class="form-control" id="cmd-notes" rows="3" placeholder="Ex: Bâtiment bleu, 2ème étage, près de la pharmacie..."></textarea>
            </div>
        </div>
        <div class="modal-footer-cmd">
            <button onclick="allerStep2()" class="btn btn-dark rounded-pill w-100">
                Continuer →
            </button>
            <button onclick="fermerModal()" class="btn btn-outline-secondary rounded-pill w-100 mb-2">
                Annuler
            </button>
        </div>
    </div>

    <!-- Étape 2 : Récapitulatif -->
    <div class="modal-step" id="step2" style="display:none;">
        <div class="modal-header-cmd">
            <button onclick="allerStep1()" class="btn btn-sm"><i class="bi bi-arrow-left"></i></button>
            <h2>Récapitulatif</h2>
            <button onclick="fermerModal()" class="btn btn-sm"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="modal-body-cmd" id="recapBody"></div>
        <div class="modal-footer-cmd">
            <button onclick="confirmerCommande()" class="btn btn-primary-custom rounded-pill w-100">
                <i class="bi bi-check-circle me-2"></i>Confirmer la commande
            </button>
        </div>
    </div>

    <!-- Étape 3 : Succès -->
    <div class="modal-step text-center py-5" id="step3" style="display:none;">
        <i class="bi bi-check-circle-fill text-success" style="font-size:56px;"></i>
        <h2 class="mt-3">Commande confirmée !</h2>
        <p class="text-muted">Nous vous contacterons au <span id="recap-tel-confirm"></span></p>
        <button onclick="fermerModal()" class="btn btn-dark rounded-pill px-4 mt-2">
            Fermer
        </button>
    </div>

</div>
