<!-- Barre de recherche sticky -->
<div class="search-sticky-wrapper">
    <div class="search-container sticky" id="searchContainer">
        <div class="container">
            <div class="search-wrapper">
                <div class="search-input-group">
                    <span class="search-icon">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="text" 
                        class="search-input" 
                        placeholder="Rechercher un produit, une marque..." 
                        id="searchInput">
                    <button class="search-clear" id="searchClear" style="display: none;">
                        <i class="bi bi-x-lg"></i>
                    </button>
                    <button class="btn btn-sm btn-primary-custom rounded-circle me-2"><i class="bi bi-arrow-right"></i></button>
                </div>
                
                <!-- Suggestions de recherche -->
                <div class="search-suggestions" id="searchSuggestions" style="display: none;">
                    <div class="suggestions-header">
                        <span>Suggestions récentes</span>
                        <button class="clear-all">Tout effacer</button>
                    </div>
                    <div class="suggestions-list">
                        <!-- Suggestions dynamiques -->
                    </div>
                </div>
            </div>
        </div>
    </div>
